<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0d0f14;
  --bg-card: #151821;
  --bg-hover: #1c2030;
  --bg-surface: #1a1d28;
  --text-primary: #e8e4dd;
  --text-secondary: #8a8690;
  --text-muted: #55525c;
  --accent-warm: #d4956a;
  --accent-gold: #c9a84c;
  --accent-rose: #b86b78;
  --accent-sage: #6b9b7d;
  --accent-violet: #8b7bb5;
  --accent-sky: #6a8fb5;
  --border: #252836;
  --border-subtle: #1e2130;
  --role-user: #d4956a;
  --role-assistant: #6a8fb5;
  --role-mixed: #9f8f90;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.container { max-width: 840px; margin: 0 auto; padding: 0 12px; }

.ambient-glow {
  position: fixed; width: 600px; height: 600px; border-radius: 50%;
  filter: blur(120px); opacity: 0.06; pointer-events: none; z-index: 0;
}
.glow-1 { top: -200px; right: -100px; background: var(--accent-violet); }
.glow-2 { bottom: -200px; left: -200px; background: var(--accent-warm); }

/* -- Header -- */
.header { padding: 80px 0 48px; position: relative; z-index: 1; }

.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--accent-violet); margin-bottom: 32px;
  opacity: 0; animation: fadeUp 0.8s ease forwards;
}

.profile-grid {
  display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: end;
  opacity: 0; animation: fadeUp 0.8s ease 0.1s forwards;
}

.profile-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px; font-weight: 700; line-height: 1.1; margin-bottom: 8px;
}

.profile-meta { font-size: 15px; color: var(--text-secondary); }
.profile-meta span { display: inline-block; margin-right: 16px; }
.profile-meta span::before {
  content: ''; display: inline-block; width: 4px; height: 4px;
  border-radius: 50%; background: var(--text-muted); margin-right: 8px; vertical-align: middle;
}
.profile-meta span:first-child::before { display: none; }

.stat-number { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 500; color: var(--accent-warm); }
.stat-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
.profile-stats { text-align: right; }

.divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 40px 0; }

/* -- Unfinished business -- */
.unfinished-section { padding: 24px 0 40px; opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards; }
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 24px;
}

.unfinished-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.unfinished-item { display: flex; align-items: baseline; gap: 10px; padding: 12px 16px; border-radius: var(--radius-sm); transition: background 0.2s; }
.unfinished-item:hover { background: var(--bg-card); }
.unfinished-dot { width: 6px; height: 6px; border-radius: 50%; border: 1.5px solid var(--accent-rose); flex-shrink: 0; margin-top: 6px; }
.unfinished-text { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }

/* -- Chain type sections -- */
.chain-section { padding: 24px 0 40px; }

.chain-type-block { margin-bottom: 40px; opacity: 0; animation: fadeUp 0.6s ease forwards; }

.chain-type-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}

.chain-type-icon {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
}

.chain-type-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; }
.chain-type-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-left: auto; }

.chain-list { display: flex; flex-direction: column; gap: 6px; padding-left: 20px; }

.chain-item {
  background: var(--bg-card); border: 1px solid transparent; border-radius: var(--radius-sm);
  padding: 16px 20px; cursor: pointer; transition: all 0.25s; position: relative;
}
.chain-item:hover { background: var(--bg-hover); border-color: var(--border); }
.chain-item.expanded { background: var(--bg-hover); border-color: var(--border); }

.chain-top { display: flex; align-items: start; gap: 12px; }

.chain-text { font-size: 15px; line-height: 1.6; flex: 1; }

.chain-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

.badge {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
  padding: 2px 8px; border-radius: 3px; text-transform: uppercase;
}
.badge-cross { background: rgba(139,123,181,0.12); color: var(--accent-violet); }
.badge-project { background: rgba(106,143,181,0.1); color: var(--accent-sky); }
.badge-type { background: rgba(85,82,92,0.2); color: var(--text-muted); }

.importance-high { background: rgba(212,149,106,0.15); color: var(--accent-warm); }
.importance-med { background: rgba(201,168,76,0.12); color: var(--accent-gold); }
.importance-low { background: rgba(85,82,92,0.2); color: var(--text-muted); }

/* -- Drill-down -- */
.drill-down { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s; opacity: 0; }
.drill-down.open { max-height: none; opacity: 1; }

.drill-content { padding: 16px 0 8px; }
.drill-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
}

.member-item {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 6px;
}

.member-header { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }

.member-uid { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-warm); }
.member-ts { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
.member-project {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 1px 5px; border-radius: 3px;
  background: rgba(106,143,181,0.1); color: var(--accent-sky);
}
.member-role {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase;
  padding: 1px 5px; border-radius: 3px; background: rgba(85,82,92,0.15); color: var(--text-muted);
}

.member-content { font-size: 13px; color: var(--text-secondary); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

/* -- Footer -- */
.pipeline-footer { padding: 40px 0 60px; border-top: 1px solid var(--border-subtle); }
.pipeline-steps { display: flex; gap: 4px; align-items: center; justify-content: center; flex-wrap: wrap; }
.pipeline-step { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); padding: 4px 10px; border-radius: 4px; background: var(--bg-card); }
.pipeline-arrow { color: var(--text-muted); font-size: 12px; }
.pipeline-label { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 16px; }

/* -- Collapsible sections -- */
.section-header {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  user-select: none; margin-bottom: 24px;
}
.section-header:hover { opacity: 0.8; }
.section-chevron {
  font-size: 10px; color: var(--text-muted); transition: transform 0.2s;
  width: 16px; text-align: center; flex-shrink: 0;
}
.section-header.collapsed .section-chevron { transform: rotate(-90deg); }
.section-body { transition: max-height 0.3s ease; }
.section-header.collapsed + .section-body { display: none; }

.loading {
  display: flex; align-items: center; justify-content: center; min-height: 60vh;
  font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--text-muted); font-style: italic;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px) {
  .profile-name { font-size: 32px; }
  .profile-grid { grid-template-columns: 1fr; }
  .profile-stats { text-align: left; }
  .unfinished-grid { grid-template-columns: 1fr; }
  .container { padding: 0 8px; }
  .chain-list { padding-left: 0; }
  .drill-content { padding-left: 0; }
  .header { padding: 32px 0 20px; }
  .chain-item { padding: 12px 14px; }
  .member-item { padding: 10px 12px; }
}
</style>
</head>
<body>

<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<div id="app" class="container">
  <div class="loading">Dreaming...</div>
</div>

<script>
const CHAIN_TYPES = {
  correction: { icon: '!', color: 'var(--accent-rose)', bg: 'rgba(184,107,120,0.08)', label: 'Corrections' },
  orphan:     { icon: '?', color: 'var(--accent-warm)', bg: 'rgba(212,149,106,0.08)', label: 'Unfinished Cycles' },
  thematic:   { icon: '~', color: 'var(--accent-sage)', bg: 'rgba(107,155,125,0.08)', label: 'Thematic Chains' },
  causal:     { icon: '>', color: 'var(--accent-gold)', bg: 'rgba(201,168,76,0.08)', label: 'Causal Chains' },
  temporal_link: { icon: '<>', color: 'var(--accent-violet)', bg: 'rgba(139,123,181,0.08)', label: 'Temporal Links' },
};

let DATA = null;

async function loadData() {
  try {
    const params = new URLSearchParams(window.location.search);
    const src = params.get('src') || 'dream_report.json';
    const res = await fetch(src + '?t=' + Date.now());
    DATA = await res.json();
    render();
    loadReportHistory();
  } catch (err) {
    document.getElementById('app').innerHTML =
      `<div class="loading">Could not load dream_report.json. Run: cx dream --force</div>`;
  }
}

async function loadReportHistory() {
  // Try to fetch the reports directory listing
  try {
    const res = await fetch('dream_reports/?t=' + Date.now());
    if (!res.ok) return;
    const html = await res.text();
    // Parse directory listing for .json files
    const files = [...html.matchAll(/href="(dream_report_[^"]+\.json)"/g)]
      .map(m => m[1]).sort().reverse();
    if (files.length < 2) return;

    const nav = document.createElement('div');
    nav.style.cssText = 'text-align:center;padding:8px 0;font-family:JetBrains Mono,monospace;font-size:11px';
    nav.innerHTML = `<select onchange="if(this.value)location.search='?src=dream_reports/'+this.value" style="background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-family:inherit;font-size:inherit">
      <option value="">Report history (${files.length})</option>
      ${files.map(f => {
        const ts = f.replace('dream_report_','').replace('.json','').replace('T',' ');
        const sel = location.search.includes(f) ? ' selected' : '';
        return `<option value="${f}"${sel}>${ts}</option>`;
      }).join('')}
    </select>`;
    const header = document.querySelector('.header');
    if (header) header.appendChild(nav);
  } catch (e) { /* no directory listing available */ }
}

const KERNEL_TYPES = {
  correction: { color: 'var(--accent-rose)', icon: '!' },
  orphan:     { color: 'var(--accent-warm)', icon: '?' },
  pattern:    { color: 'var(--accent-violet)', icon: '~' },
  stress:     { color: 'var(--accent-rose)', icon: '*' },
  growth:     { color: 'var(--accent-sage)', icon: '+' },
  question:   { color: 'var(--text-secondary)', icon: '?' },
};

function render() {
  const { profile, chains, kernels, data_story, top_insights, cross_project } = DATA;
  const stats = profile.stats || {};
  const generated = profile.generated ? profile.generated.slice(0, 16).replace('T', ' ') : '';
  const totalChains = Object.values(chains).reduce((a, arr) => a + arr.length, 0);
  const hasKernels = kernels && kernels.length > 0;

  // Build chain lookup by UID for kernel drill-down
  const chainLookup = {};
  for (const arr of Object.values(chains)) {
    for (const c of arr) {
      if (c.uid) chainLookup[c.uid] = c;
    }
  }

  let html = `
    <header class="header">
      <div class="brand">Continuum Dream Report</div>
      <div class="profile-grid">
        <div>
          <h1 class="profile-name">${profile.name || 'Dream Report'}</h1>
          <div class="profile-meta">
            <span>${generated}</span>
            <span>${stats.corpus_entries?.toLocaleString() || 0} corpus entries</span>
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-number">${hasKernels ? kernels.length : totalChains}</div>
          <div class="stat-label">${hasKernels ? 'kernels' : 'chains'}</div>
          <div style="margin-top:8px">
            <div class="stat-number">${totalChains}</div>
            <div class="stat-label">raw chains</div>
          </div>
        </div>
      </div>
    </header>

    <div class="divider"></div>
  `;

  // Data story (synthesis narrative)
  if (data_story) {
    html += `
      <section style="padding:40px 0;opacity:0;animation:fadeUp 0.8s ease 0.2s forwards">
        <div class="section-title" style="color:var(--accent-gold)">The Arc</div>
        <p style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;font-style:italic;line-height:1.7;max-width:720px">${data_story}</p>
      </section>
      <div class="divider"></div>
    `;
  }

  // Top insights (synthesis)
  if (top_insights && top_insights.length > 0) {
    html += `
      <section style="padding:24px 0 40px">
        <div class="section-title">What Matters Most</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${top_insights.map((insight, i) => `
            <div class="chain-item" style="cursor:default;border-left:3px solid ${['var(--accent-warm)','var(--accent-gold)','var(--accent-sage)'][i] || 'var(--border)'}">
              <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:8px">0${i+1}</div>
              <div class="chain-text">${insight}</div>
            </div>
          `).join('')}
        </div>
      </section>
      <div class="divider"></div>
    `;
  }

  // Synthesized kernels — the primary content
  if (hasKernels) {
    // Group by type
    const byType = {};
    kernels.forEach(k => {
      const t = k.type || 'pattern';
      (byType[t] = byType[t] || []).push(k);
    });

    // Show orphan/correction first, then others
    const kernelOrder = ['orphan', 'correction', 'stress', 'pattern', 'growth', 'question'];
    const kernelLabels = {
      orphan: 'Unfinished Business', correction: 'Recurring Corrections',
      stress: 'Pain Points', pattern: 'Patterns', growth: 'What Works', question: 'Open Questions'
    };

    html += `<section class="chain-section">`;
    for (const ktype of kernelOrder) {
      const items = byType[ktype] || [];
      if (items.length === 0) continue;
      const kt = KERNEL_TYPES[ktype] || KERNEL_TYPES.pattern;
      const secId = `sec-${ktype}`;
      html += `
        <div class="chain-type-block">
          <div class="section-header collapsed" onclick="toggleSection('${secId}', this)">
            <div class="section-chevron">&#9660;</div>
            <div class="chain-type-icon" style="background:rgba(255,255,255,0.03);color:${kt.color}">${kt.icon}</div>
            <div class="chain-type-name">${kernelLabels[ktype] || ktype}</div>
            <div class="chain-type-count">${items.length}</div>
          </div>
          <div class="section-body" id="${secId}" style="display:none">
          <div class="chain-list">
            ${items.sort((a,b) => (b.importance||5) - (a.importance||5)).map((k, i) => {
              const imp = k.importance || 5;
              const impClass = imp >= 8 ? 'importance-high' : imp >= 5 ? 'importance-med' : 'importance-low';
              const kid = `kernel-${ktype}-${i}`;
              const refs = k.chain_refs || [];
              const backingChains = refs.map(ref => chainLookup[ref]).filter(Boolean);
              const allMembers = backingChains.flatMap(c => c.members || []);
              const kernelBorder = blendRoleColor(allMembers);
              return `
                <div class="chain-item" id="${kid}" onclick="toggleDrill('${kid}')" style="cursor:pointer;border-left:3px solid ${kernelBorder}">
                  <div class="chain-top">
                    <div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px" class="${impClass}">${imp}</div>
                    <div class="chain-text">${k.content || ''}</div>
                  </div>
                  <div class="chain-badges">
                    ${k.cross_project ? '<span class="badge badge-cross">cross-project</span>' : ''}
                    <span class="badge badge-type">${ktype}</span>
                    ${refs.length ? `<span class="badge badge-type">${refs.length} chains</span>` : ''}
                  </div>
                  <div class="drill-down" id="drill-${kid}">
                    <div class="drill-content">
                      <div class="drill-label">Backing chains (${backingChains.length})</div>
                      ${backingChains.map((c, ci) => {
                        const cid = `${kid}-chain-${ci}`;
                        const members = c.members || [];
                        return `
                        <div class="member-item" id="${cid}" onclick="event.stopPropagation(); toggleDrill('${cid}')" style="cursor:pointer;border-left:3px solid ${blendRoleColor(members)}">
                          <div class="member-header">
                            <span class="member-uid">${c.uid || ''}</span>
                            <span class="badge badge-type">${c.type || ''}</span>
                            ${(c.projects||[]).map(p => `<span class="member-project">${p}</span>`).join('')}
                            <span class="badge badge-type">${members.length} chunks</span>
                          </div>
                          <div class="member-content">${escapeHtml(c.synthesis || '')}</div>
                          <div class="drill-down" id="drill-${cid}">
                            <div class="drill-content">
                              <div class="drill-label">Member chunks (${members.length})</div>
                              ${members.map(m => `
                                <div class="member-item" style="cursor:default;margin-left:12px;border-left:3px solid ${roleColor(m.role)}">
                                  <div class="member-header">
                                    <span class="member-uid">${m.uid || ''}</span>
                                    <span class="member-ts">${(m.ts || '').slice(0, 16)}</span>
                                    <span class="member-project">${m.thread || ''}</span>
                                    <span class="member-role" style="color:${roleColor(m.role)}">${m.role || ''}</span>
                                  </div>
                                  <div class="member-content">${escapeHtml(m.content || '')}</div>
                                </div>
                              `).join('')}
                            </div>
                          </div>
                        </div>
                        `;
                      }).join('')}
                      ${backingChains.length === 0 ? '<div style="color:var(--text-muted);font-size:12px">Chain refs not resolved in current report data</div>' : ''}
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          </div>
        </div>
      `;
    }
    html += `</section><div class="divider"></div>`;
  }

  // Raw chains accessible only through kernel drill-down (group → kernel → chain → chunk)

  // Footer
  html += `
    <div class="pipeline-footer">
      <div class="pipeline-steps">
        <span class="pipeline-step">${stats.corpus_entries?.toLocaleString() || '?'} entries</span>
        <span class="pipeline-arrow">&rarr;</span>
        <span class="pipeline-step">cluster</span>
        <span class="pipeline-arrow">&rarr;</span>
        <span class="pipeline-step">integrate</span>
        <span class="pipeline-arrow">&rarr;</span>
        <span class="pipeline-step">${totalChains} chains</span>
      </div>
      <div class="pipeline-label">
        cx dream &middot; Ollama (local) &middot; ${stats.tokens_used?.toLocaleString() || '?'} tokens
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
}

function renderChainItem(chain, typeKey, idx) {
  const id = `chain-${typeKey}-${idx}`;
  const projects = (chain.projects || []).filter(p => p);
  return `
    <div class="chain-item" id="${id}" onclick="toggleDrill('${id}')">
      <div class="chain-top">
        <div class="chain-text">${chain.synthesis || ''}</div>
      </div>
      <div class="chain-badges">
        ${chain.cross_project ? '<span class="badge badge-cross">cross-project</span>' : ''}
        ${projects.map(p => `<span class="badge badge-project">${p}</span>`).join('')}
        <span class="badge badge-type">${chain.type || typeKey}</span>
        <span class="badge badge-type">${chain.member_count || 0} chunks</span>
      </div>
      <div class="drill-down" id="drill-${id}">
        <div class="drill-content">
          <div class="drill-label">Member chunks (${(chain.members || []).length})</div>
          ${(chain.members || []).map(m => `
            <div class="member-item">
              <div class="member-header">
                <span class="member-uid">${m.uid || ''}</span>
                <span class="member-ts">${(m.ts || '').slice(0, 16)}</span>
                <span class="member-project">${m.thread || ''}</span>
                <span class="member-role">${m.role || ''}</span>
              </div>
              <div class="member-content">${escapeHtml(m.content || '')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function roleColor(role) {
  if (role === 'user') return 'var(--role-user)';
  if (role === 'assistant') return 'var(--role-assistant)';
  return 'var(--role-mixed)';
}

function blendRoleColor(members) {
  // Compute user/assistant ratio from members, return CSS color
  if (!members || members.length === 0) return 'var(--border)';
  let user = 0, assistant = 0;
  for (const m of members) {
    if (m.role === 'user') user++;
    else if (m.role === 'assistant') assistant++;
  }
  const total = user + assistant;
  if (total === 0) return 'var(--border)';
  if (user === total) return 'var(--role-user)';
  if (assistant === total) return 'var(--role-assistant)';
  // Blend: interpolate between user(warm) and assistant(sky)
  const ratio = user / total; // 1 = all user, 0 = all assistant
  // #d4956a (user) → #6a8fb5 (assistant)
  const r = Math.round(0x6a + ratio * (0xd4 - 0x6a));
  const g = Math.round(0x8f + ratio * (0x95 - 0x8f));
  const b = Math.round(0xb5 + ratio * (0x6a - 0xb5));
  return `rgb(${r},${g},${b})`;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function toggleSection(sectionId, headerEl) {
  const body = document.getElementById(sectionId);
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? 'block' : 'none';
  headerEl.classList.toggle('collapsed', !isHidden);
}

function toggleDrill(chainId) {
  const el = document.getElementById('drill-' + chainId);
  const item = document.getElementById(chainId);
  el.classList.toggle('open');
  item.classList.toggle('expanded');
}

loadData();
</script>
